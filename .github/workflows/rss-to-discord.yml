name: RSS Tech Feeds to Discord

on:
  schedule:
    # Runs at 06:00 UTC and 18:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual runs from the Actions tab

permissions:
  contents: write # Required to commit updated state/seen_posts.json

jobs:
  fetch-and-notify:
    name: Fetch RSS & Post to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch feeds and send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/fetch_rss.py

      - name: Commit updated state file
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_posts.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update seen posts state [skip ci]"
          git push
